name: Release Announcement
run-name: ${{ github.actor }} is announcing pearOS ${{ github.ref_name }} 🍐
on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to simulate (ex: v26.6)'
        required: true
        default: 'v26.6'
jobs:
  Announce-Release:
    runs-on: ubuntu-latest
    steps:
      - run: echo "🎉 The job was automatically triggered by a ${{ github.event_name }} event."
      - run: echo "🐧 This job is now running on a ${{ runner.os }} server hosted by GitHub!"
      - run: echo "🔎 The tag is ${{ github.ref }} in repository ${{ github.repository }}."
      - name: Check out repository code
        uses: actions/checkout@v4
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - name: Parse tag into ISO URL
        id: parse
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          YEAR="20${VERSION%%.*}"
          MONTH=$(printf "%02d" "${VERSION##*.}")
          echo "year=$YEAR" >> "$GITHUB_OUTPUT"
          echo "month=$MONTH" >> "$GITHUB_OUTPUT"
          echo "iso_url=https://iso.pearos.xyz/iso/pearOS-NiceC0re-${YEAR}.${MONTH}-x86_64.iso" >> "$GITHUB_OUTPUT"
          echo "version=${YEAR}.${MONTH}" >> "$GITHUB_OUTPUT"
          echo "sha=$(cat sha.txt)" >> "$GITHUB_OUTPUT"
      - run: echo "🍏 Parsed version ${{ steps.parse.outputs.version }}, ISO at ${{ steps.parse.outputs.iso_url }}"
      - name: Announce on Discord
        uses: sarisia/actions-status-discord@v1.16.0
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          nodetail: true
          noprefix: true
          title: "pearOS NiceC0re ${{ steps.parse.outputs.version }} is out!"
          description: |
            A new monthly release of pearOS NiceC0re is available.

            **Download:** ${{ steps.parse.outputs.iso_url }}
            **SHA256:** `${{ steps.parse.outputs.sha }}`
          color: 0xf5a623
          username: pearOS Releases
      - run: echo "🍏 This job's status is ${{ job.status }}."
